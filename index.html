<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dado Animado</title>

<style>

body{
    background: linear-gradient(135deg,#74ebd5,#2c7be5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
}

#dice{
    width:120px;
    height:120px;
    background:white;
    border-radius:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    padding:15px;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.dot{
    width:18px;
    height:18px;
    background:#333;
    border-radius:50%;
    justify-self:center;
    align-self:center;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    font-size:16px;
    cursor:pointer;
}

.roll{
    animation: spin 0.6s linear infinite;
}

@keyframes spin{
    0%{ transform: rotate(0deg) scale(1); }
    50%{ transform: rotate(180deg) scale(1.1); }
    100%{ transform: rotate(360deg) scale(1); }
}

</style>
</head>

<body>

<div id="dice"></div>
<button onclick="rollDice()">🎲 Jogar dado</button>

<script>

const dice=document.getElementById("dice")

const faces={
1:[5],
2:[1,9],
3:[1,5,9],
4:[1,3,7,9],
5:[1,3,5,7,9],
6:[1,3,4,6,7,9]
}

function drawFace(num){

dice.innerHTML=""

for(let i=1;i<=9;i++){

let cell=document.createElement("div")

if(faces[num].includes(i)){
let dot=document.createElement("div")
dot.className="dot"
cell.appendChild(dot)
}

dice.appendChild(cell)
}

}

function rollDice(){

dice.classList.add("roll")

let rolling=setInterval(()=>{
drawFace(Math.floor(Math.random()*6)+1)
},100)

setTimeout(()=>{
clearInterval(rolling)
dice.classList.remove("roll")
drawFace(Math.floor(Math.random()*6)+1)
},1000)

}

drawFace(1)

</script>

</body>
</html>
