<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dois Dados</title>

<style>

body{
    background:linear-gradient(135deg,#74ebd5,#2c7be5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
}

.container{
    display:flex;
    gap:40px;
}

.dice{
    width:110px;
    height:110px;
    border-radius:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    padding:12px;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

#dicePositive{
    background:white;
}

#diceNegative{
    background:#ff6b6b;
}

.dot{
    width:16px;
    height:16px;
    background:#333;
    border-radius:50%;
    justify-self:center;
    align-self:center;
}

.roll{
    animation:spin 0.7s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg) scale(1)}
50%{transform:rotate(180deg) scale(1.1)}
100%{transform:rotate(360deg) scale(1)}
}

button{
    margin-top:30px;
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">
<div id="dicePositive" class="dice"></div>
<div id="diceNegative" class="dice"></div>
</div>

<button onclick="rollDice()">🎲 Jogar Dados</button>

<script>

const dicePositive=document.getElementById("dicePositive")
const diceNegative=document.getElementById("diceNegative")

const faces={
1:[5],
2:[1,9],
3:[1,5,9],
4:[1,3,7,9],
5:[1,3,5,7,9],
6:[1,3,4,6,7,9]
}

function drawFace(dice,num){

dice.innerHTML=""

for(let i=1;i<=9;i++){

let cell=document.createElement("div")

if(faces[num].includes(i)){
let dot=document.createElement("div")
dot.className="dot"
cell.appendChild(dot)
}

dice.appendChild(cell)
}

}

function randomFace(){
return Math.floor(Math.random()*6)+1
}

function rollDice(){

dicePositive.classList.add("roll")
diceNegative.classList.add("roll")

let rolling=setInterval(()=>{

drawFace(dicePositive,randomFace())
drawFace(diceNegative,randomFace())

},100)

setTimeout(()=>{

clearInterval(rolling)

dicePositive.classList.remove("roll")
diceNegative.classList.remove("roll")

drawFace(dicePositive,randomFace())
drawFace(diceNegative,randomFace())

},1000)

}

drawFace(dicePositive,1)
drawFace(diceNegative,1)

</script>

</body>
</html>
